<svg viewBox="0 0 1200 380" width="100%" height="340" xmlns="http://www.w3.org/2000/svg">
    <style>
        text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .box-bg { fill: #e6f4ea; stroke: #a7cdb3; stroke-width: 1; }
        .title { font-weight: 700; font-size: 16px; fill: #1a202c; }
        .content { font-size: 13px; fill: #4a5568; }
    </style>

    <g>
        <rect class="box-bg" x="20" y="20" width="570" height="100" rx="6"/>
        <rect x="20" y="20" width="4" height="100" fill="#1f883d"/>
        <text class="title" x="40" y="50">Extensible</text>
        <text class="content" x="40" y="78">Attribute providers, theme providers and UI Awesome integration</text>
        <text class="content" x="40" y="98">Defaults keep reusable element configuration predictable</text>
    </g>

    <g>
        <rect class="box-bg" x="610" y="20" width="570" height="100" rx="6"/>
        <rect x="610" y="20" width="4" height="100" fill="#1f883d"/>
        <text class="title" x="630" y="50">Fluent &amp; Immutable</text>
        <text class="content" x="630" y="78">Method chaining &#8226; reusable element instances &#8226; side-effect free rendering</text>
        <text class="content" x="630" y="98">Every attribute update returns a new element instance</text>
    </g>

    <g>
        <rect class="box-bg" x="20" y="140" width="570" height="100" rx="6"/>
        <rect x="20" y="140" width="4" height="100" fill="#1f883d"/>
        <text class="title" x="40" y="170">HTML5 Elements</text>
        <text class="content" x="40" y="198">Root, metadata, flow, phrasing, embedded, form, list and table tags</text>
        <text class="content" x="40" y="218">Organized namespaces with concrete element classes</text>
    </g>

    <g>
        <rect class="box-bg" x="610" y="140" width="570" height="100" rx="6"/>
        <rect x="610" y="140" width="4" height="100" fill="#1f883d"/>
        <text class="title" x="630" y="170">Rendering Helpers</text>
        <text class="content" x="630" y="198">begin() and end() streaming &#8226; void tags handled consistently</text>
        <text class="content" x="630" y="218">Composition with nested elements, strings and Stringable values</text>
    </g>

    <g>
        <rect class="box-bg" x="20" y="260" width="570" height="100" rx="6"/>
        <rect x="20" y="260" width="4" height="100" fill="#1f883d"/>
        <text class="title" x="40" y="290">Safe by Default</text>
        <text class="content" x="40" y="318">content() encodes text &#8226; html() accepts trusted raw markup</text>
        <text class="content" x="40" y="338">Predictable output with standards-compliant HTML rendering</text>
    </g>

    <g>
        <rect class="box-bg" x="610" y="260" width="570" height="100" rx="6"/>
        <rect x="610" y="260" width="4" height="100" fill="#1f883d"/>
        <text class="title" x="630" y="290">Typed Attributes</text>
        <text class="content" x="630" y="318">Global attributes, data-* and aria-* helpers with enum-backed APIs</text>
        <text class="content" x="630" y="338">Element-specific fluent methods validate and render attributes</text>
    </g>
</svg>
