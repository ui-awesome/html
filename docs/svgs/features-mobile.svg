<!-- Mobile version - Single column -->
<svg viewBox="0 0 620 620" width="100%" height="580" xmlns="http://www.w3.org/2000/svg">
    <style>
        text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .box-bg { fill: #e6f4ea; stroke: #a7cdb3; stroke-width: 1; }
        .title { font-weight: 700; font-size: 14px; fill: #1a202c; }
        .content { font-size: 11px; fill: #4a5568; }
    </style>

    <g>
        <rect class="box-bg" x="16" y="16" width="588" height="84" rx="6"/>
        <rect x="16" y="16" width="4" height="84" fill="#1f883d"/>
        <text class="title" x="32" y="42">Extensible</text>
        <text class="content" x="32" y="66">Attribute providers, theme providers and UI Awesome integration</text>
        <text class="content" x="32" y="84">Defaults keep reusable element configuration predictable</text>
    </g>
    <g>
        <rect class="box-bg" x="16" y="116" width="588" height="84" rx="6"/>
        <rect x="16" y="116" width="4" height="84" fill="#1f883d"/>
        <text class="title" x="32" y="142">Fluent &amp; Immutable</text>
        <text class="content" x="32" y="166">Method chaining &#8226; reusable instances &#8226; side-effect free rendering</text>
        <text class="content" x="32" y="184">Every attribute update returns a new element instance</text>
    </g>
    <g>
        <rect class="box-bg" x="16" y="216" width="588" height="84" rx="6"/>
        <rect x="16" y="216" width="4" height="84" fill="#1f883d"/>
        <text class="title" x="32" y="242">HTML5 Elements</text>
        <text class="content" x="32" y="266">Root, metadata, flow, embedded, form, list and table tags</text>
        <text class="content" x="32" y="284">Organized namespaces with concrete element classes</text>
    </g>
    <g>
        <rect class="box-bg" x="16" y="316" width="588" height="84" rx="6"/>
        <rect x="16" y="316" width="4" height="84" fill="#1f883d"/>
        <text class="title" x="32" y="342">Rendering Helpers</text>
        <text class="content" x="32" y="366">begin() and end() streaming &#8226; void tags handled consistently</text>
        <text class="content" x="32" y="384">Composition with nested elements, strings and Stringable values</text>
    </g>
    <g>
        <rect class="box-bg" x="16" y="416" width="588" height="84" rx="6"/>
        <rect x="16" y="416" width="4" height="84" fill="#1f883d"/>
        <text class="title" x="32" y="442">Safe by Default</text>
        <text class="content" x="32" y="466">content() encodes text &#8226; html() accepts trusted raw markup</text>
        <text class="content" x="32" y="484">Predictable output with standards-compliant HTML rendering</text>
    </g>
    <g>
        <rect class="box-bg" x="16" y="516" width="588" height="84" rx="6"/>
        <rect x="16" y="516" width="4" height="84" fill="#1f883d"/>
        <text class="title" x="32" y="542">Typed Attributes</text>
        <text class="content" x="32" y="566">Global attributes, data-* and aria-* helpers with enum-backed APIs</text>
        <text class="content" x="32" y="584">Element-specific fluent methods validate and render attributes</text>
    </g>
</svg>
